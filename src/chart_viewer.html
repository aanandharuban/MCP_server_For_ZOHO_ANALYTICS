<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Zoho Analytics Chart Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 0;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #1f2937;
      border-bottom: 1px solid #374151;
      flex-shrink: 0;
    }

    #report-title {
      flex: 1;
      color: #f9fafb;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s, transform 0.1s;
    }

    .toolbar-btn:active { transform: scale(0.96); }
    #btn-zoom-in  { background: #2563eb; color: #fff; }
    #btn-zoom-out { background: #4b5563; color: #fff; }
    #btn-reset    { background: #6b7280; color: #fff; }
    #btn-download { background: #059669; color: #fff; }
    .toolbar-btn:hover { filter: brightness(1.15); }

    #status {
      padding: 12px 16px;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
      flex-shrink: 0;
    }

    #status.error {
      color: #ef4444;
      background: #fef2f2;
      border-bottom: 1px solid #fecaca;
    }

    #chart-wrapper {
      flex: 1;
      overflow: auto;
      position: relative;
      background: #fff;
    }

    #chart-container {
      transform-origin: center;
      align-items: center;
      transition: transform 0.2s ease;
      width: 60%;
      min-height: 400px;
      padding: 16px;
    }

    #chart-canvas {
      width: 100%;
      height: 520px;
      min-height: 520px;
      max-height: 720px;
    }

    #chart-image {
      display: none;
      grid-area: auto;
      width: 55%;
      height: auto;
      max-width: 100%;
      align-items: center
    }

    #chart-frame {
      width: 60%;
      min-height: 400px;
      border: none;
      display: none;
      align-items: center
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <span id="report-title">Zoho Analytics Chart</span>
    <button class="toolbar-btn" id="btn-zoom-in">+ Zoom In</button>
    <button class="toolbar-btn" id="btn-zoom-out">- Zoom Out</button>
    <button class="toolbar-btn" id="btn-reset">Reset</button>
    <button class="toolbar-btn" id="btn-download">Download</button>
  </div>

  <div id="status">Waiting for chart data...</div>

  <div id="chart-wrapper">
    <div id="chart-container">
      <img id="chart-image" alt="Zoho Analytics chart export" />
      <cener>
      <canvas id="chart-canvas" height="520"></canvas>
      <iframe id="chart-frame" sandbox="allow-scripts allow-same-origin"></iframe>
      </cener>
    </div>
  </div>

  <script type="module">
    import { App } from
      "https://unpkg.com/@modelcontextprotocol/ext-apps@0.4.0/app-with-deps";

    const app = new App({ name: "Zoho Chart Viewer", version: "1.0.0" });
    let scale = 1.0;
    let activeChart = null;

    const container = document.getElementById("chart-container");
    const chartFrame = document.getElementById("chart-frame");
    const chartCanvas = document.getElementById("chart-canvas");
    const chartImage = document.getElementById("chart-image");
    const status = document.getElementById("status");
    const titleEl = document.getElementById("report-title");

    function applyZoom() {
      container.style.transform = `scale(${scale})`;
      container.parentElement.style.height = (container.scrollHeight * scale) + "px";
    }

    document.getElementById("btn-zoom-in").addEventListener("click", () => {
      scale = Math.min(scale + 0.2, 4.0);
      applyZoom();
    });
    document.getElementById("btn-zoom-out").addEventListener("click", () => {
      scale = Math.max(scale - 0.2, 0.3);
      applyZoom();
    });
    document.getElementById("btn-reset").addEventListener("click", () => {
      scale = 1.0;
      applyZoom();
    });

    document.getElementById("btn-download").addEventListener("click", async () => {
      try {
        const { default: html2canvas } = await import(
          "https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.esm.js"
        );
        const canvas = await html2canvas(container, { scale: 2, useCORS: true });
        const link = document.createElement("a");
        link.download = (titleEl.textContent || "chart") + ".png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      } catch (err) {
        alert("Download requires html2canvas: " + err.message);
      }
    });

    function extractRows(raw) {
      const data = raw?.data ?? raw;
      if (Array.isArray(data)) return data;
      if (Array.isArray(data?.rows)) return data.rows;
      if (Array.isArray(data?.result)) return data.result;
      if (Array.isArray(data?.data)) return data.data;
      if (Array.isArray(data?.result?.rows)) return data.result.rows;
      if (Array.isArray(data?.response?.rows)) return data.response.rows;
      return [];
    }

    function extractColumns(raw, rows) {
      const data = raw?.data ?? raw;
      const columns = data?.columns || data?.columnDetails || data?.metadata?.columns ||
        data?.result?.columns || data?.response?.columns || [];
      if (Array.isArray(columns) && columns.length) {
        return columns.map(col => col.columnName || col.name || col.displayName || col.COLUMNNAME || col);
      }
      const first = rows[0];
      return first && !Array.isArray(first) ? Object.keys(first) : [];
    }

    function cell(row, key, index) {
      if (Array.isArray(row)) return row[index];
      if (!row || typeof row !== "object") return undefined;
      if (Object.prototype.hasOwnProperty.call(row, key)) return row[key];
      const match = Object.keys(row).find(name => name.toLowerCase() === String(key).toLowerCase());
      return match ? row[match] : undefined;
    }

    function parseNumber(value) {
      if (typeof value === "number") return value;
      const cleaned = String(value ?? "")
        .replace(/,/g, "")
        .replace(/[^\d.-]/g, "");
      const parsed = Number(cleaned);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function normalizeName(name) {
      return String(name ?? "").toLowerCase().replace(/[^a-z0-9]/g, "");
    }

    function resolveColumn(columns, requested, rows, preferNumeric, skipIndex = -1) {
      if (!columns.length) return { name: requested, index: preferNumeric ? 1 : 0 };

      const wanted = normalizeName(requested);
      let index = columns.findIndex(name => normalizeName(name) === wanted);
      if (index >= 0) return { name: columns[index], index };

      index = columns.findIndex(name => {
        const normalized = normalizeName(name);
        return normalized.includes(wanted) || wanted.includes(normalized);
      });
      if (index >= 0) return { name: columns[index], index };

      if (preferNumeric) {
        index = columns.findIndex((name, columnIndex) =>
          columnIndex !== skipIndex &&
          rows.some(row => parseNumber(cell(row, name, columnIndex)) !== 0)
        );
        if (index >= 0) return { name: columns[index], index };
      }

      return { name: columns[preferNumeric ? 1 : 0] || requested, index: preferNumeric ? 1 : 0 };
    }

    function chartJsType(type) {
      if (type?.includes("pie")) return "pie";
      if (type?.includes("ring")) return "doughnut";
      if (type?.includes("line") || type?.includes("area")) return "line";
      if (type?.includes("scatter")) return "scatter";
      if (type?.includes("bubble")) return "bubble";
      return "bar";
    }

    function fallbackJson(raw) {
      chartCanvas.style.display = "none";
      chartImage.style.display = "none";
      chartFrame.style.display = "block";
      const escaped = JSON.stringify(raw, null, 2)
        .replace(/[&<>]/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[ch]));
      chartFrame.srcdoc = `<body><pre>${escaped}</pre></body>`;
    }

    async function renderChart(payload) {
      const rows = extractRows(payload.chart_data);
      const columns = extractColumns(payload.chart_data, rows);
      const xAxis = payload.chart_details?.x_axis || payload.chart_details?.xAxis || {};
      const yAxis = payload.chart_details?.y_axis || payload.chart_details?.yAxis || {};
      const xColumn = resolveColumn(columns, xAxis.columnName || columns[0], rows, false);
      const yColumn = resolveColumn(columns, yAxis.columnName || columns[1], rows, true, xColumn.index);
      const xName = xColumn.name;
      const yName = yColumn.name;
      const xIndex = xColumn.index;
      const yIndex = yColumn.index;

      if (!rows.length || !xName || !yName) return false;

      const labels = rows.map(row => String(cell(row, xName, xIndex) ?? ""));
      const values = rows.map(row => parseNumber(cell(row, yName, yIndex)));
      if (!values.some(value => value !== 0)) {
        throw new Error(`No numeric values found for '${yAxis.columnName || yName}'. Exported columns: ${columns.join(", ")}`);
      }
      const type = chartJsType(payload.chart_type);
      const Chart = window.Chart;
      if (!Chart) {
        throw new Error("Chart.js did not load.");
      }

      chartFrame.style.display = "none";
      chartImage.style.display = "none";
      chartCanvas.style.display = "block";
      chartCanvas.style.height = "520px";
      if (activeChart) activeChart.destroy();

      activeChart = new Chart(chartCanvas, {
        type,
        data: {
          labels,
          datasets: [{
            label: yName,
            data: values,
            borderColor: "#2563eb",
            backgroundColor: [
              "#2563eb", "#059669", "#dc2626", "#d97706", "#7c3aed",
              "#0891b2", "#4b5563", "#be123c", "#65a30d", "#9333ea"
            ],
            fill: payload.chart_type?.includes("area"),
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: true },
            title: { display: false },
          },
          scales: type === "pie" || type === "doughnut" ? {} : {
            x: { title: { display: true, text: xName } },
            y: { beginAtZero: true, title: { display: true, text: yName } },
          },
        },
      });
      status.textContent = `${payload.report_id ? `Report ID: ${payload.report_id} - ` : ""}${rows.length} rows`;
      return true;
    }

    app.ontoolresult = ({ content }) => {
      const textBlock = content?.find(c => c.type === "text");
      if (!textBlock) {
        status.textContent = "No data received from tool.";
        status.className = "error";
        return;
      }

      let payload;
      try {
        payload = JSON.parse(textBlock.text);
      } catch {
        status.textContent = textBlock.text;
        status.className = "error";
        return;
      }

      if (payload.error) {
        status.textContent = "Error: " + payload.error;
        status.className = "error";
        return;
      }

      titleEl.textContent = payload.report_name || "Zoho Analytics Chart";
      status.className = "";
      status.textContent = payload.warning || (payload.report_id ? `Report ID: ${payload.report_id}` : "");

      if (payload.image_data_url) {
        if (activeChart) activeChart.destroy();
        chartCanvas.style.display = "none";
        chartFrame.style.display = "none";
        chartImage.style.display = "block";
        chartImage.src = payload.image_data_url;
        chartImage.onload = () => {
          scale = 1.0;
          applyZoom();
        };
        return;
      }

      if (payload.chart_data) {
        renderChart(payload).then(rendered => {
          if (!rendered) fallbackJson(payload.chart_data);
          scale = 1.0;
          applyZoom();
        }).catch(err => {
          status.textContent = "Chart render error: " + err.message;
          status.className = "error";
          fallbackJson(payload.chart_data);
        });
        return;
      }

      chartCanvas.style.display = "none";
      chartFrame.style.display = "block";
      chartFrame.srcdoc = payload.html || "<body><p>No chart data returned.</p></body>";
    };

    await app.connect();
  </script>
</body>
</html>
